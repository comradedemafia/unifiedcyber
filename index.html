    <!--
      CSP notes:
      - 'unsafe-inline' on style-src is required by Tailwind/Radix runtime styles.
      - 'unsafe-eval' on script-src is required by Vite dev HMR and some libs.
      - For production, prefer per-build nonces or hashes; static index.html
        cannot mint a fresh nonce per response, so we tighten everything else
        instead: object-src/base-uri/form-action/frame-src locked down.
      - CSP violations are surfaced in the UI via globalErrorReporter.ts.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss: data: blob:; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
